<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historiska Röster - Flyttad</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f4f7;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px; /* Ger lite luft på sidorna i mobilen */
            box-sizing: border-box;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%; /* Gör att den fyller ut skärmen på mobilen */
        }
        h1 {
            color: #d32f2f;
            margin-top: 0;
            font-size: 1.5rem;
        }
        p {
            color: #444;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        .warning-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="warning-icon">⚠️</div>
        <h1>VIKTIG INFORMATION</h1>
        <p>
            Denna version av <strong>historiskaroster.se</strong> har stängts ner av säkerhetsskäl efter ett intrång. 
            Vi har flyttat hela verksamheten till en ny, säker plattform.
        </p>
        <p>Klicka på knappen nedan för att komma till den nya officiella hemsidan:</p>
        <a href="https://historiska-roster-2-0.vercel.app/" class="btn">Gå till nya hemsidan</a>
    </div>
</body>
</html>
